name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest black isort flake8 mypy

      - name: Syntax check all Python files
        run: |
          find . -name "*.py" -not -path "./.git/*" -not -path "./__pycache__/*" -not -path "./recproof/*" | xargs -I{} python -m py_compile {}

      - name: Lint with flake8
        run: |
          flake8 *.py tests/ scripts/ --max-line-length=100 --max-complexity=15 --extend-ignore=E203,W503

      - name: Run unit tests (excluding slow integration tests)
        run: |
          pytest tests/ -v --tb=short -m "not slow"

  build-docker:
    runs-on: ubuntu-latest
    needs: lint-and-test
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t scrutexity/recruitproof:ci .
