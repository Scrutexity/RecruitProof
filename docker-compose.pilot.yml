# RecruitProof — Rudy Pilot One-Click Executor
# ==============================================
# Mount your Encore ZIP + JD, run, get shortlist PDF + deletion receipt.
# Fully air-gapped — no network access, zero data leaves your machine.
#
# Usage:
#   mkdir -p input output
#   cp /path/to/encore_export.zip input/resumes.zip
#   cp /path/to/job_description.txt input/job.txt
#   docker compose -f docker-compose.pilot.yml up
#   # Shortlist PDF appears in ./output/shortlist.pdf
#   # Deletion receipt in ./output/deletion_receipt.json (if --auto-delete)

version: "3.8"

services:
  pilot:
    build:
      context: .
      dockerfile: pilot.Dockerfile
    container_name: recruitproof-pilot
    network_mode: "none"           # Fully air-gapped
    volumes:
      - ./input:/input:ro          # Mount ZIP + JD here (read-only)
      - ./output:/output           # Shortlist PDF + receipt appear here
      - ./data:/data               # HF cache + temp data
    environment:
      - HF_HOME=/data/.hf_cache
      - RECRUITPROOF_DATA_DIR=/data
    command: >
      --input-zip /input/resumes.zip
      --jd-file /input/job.txt
      --output-dir /output
      --auto-delete
    deploy:
      resources:
        limits:
          cpus: "8"
          memory: 32G
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "3"
